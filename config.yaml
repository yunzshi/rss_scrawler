gateway:
  port: 18789
  api_url: "http://127.0.0.1:18789/v1/chat/completions"
  # token: "your_openclaw_token"

agent:
  id: "facts_crawler"

rss:
  feeds:
    - name: "Hacker News Top"
      url: "https://hnrss.org/frontpage"
    - name: "Farnam Street"
      url: "https://fs.blog/feed/"
    - name: "阮一峰科技周刊"
      url: "https://feeds.feedburner.com/ruanyifeng"
      max_items: 5
    - name: "晚点LatePost"
      url: "https://rsshub.app/latepost"
  max_items_per_feed: 10

# deliver & history config
config:
  history_file: "$HOME/.openclaw/.rss_history.json"
  history_max_days: 30
  deliver:
    enabled: true
    channel: "feishu"
    target: "user:ou_xxx"

network:
  socks5_proxy: null
  timeout: 20
